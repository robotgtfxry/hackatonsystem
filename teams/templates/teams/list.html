{% extends 'base.html' %}

{% block title %}Zespoły{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Zespoły</h2>
    <a href="{% url 'teams:create' %}" class="btn btn-primary btn-sm">+ Utwórz</a>
</div>

{% for team in teams %}
    <div class="card mb-2 p-3">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <a href="{% url 'teams:detail' team.pk %}" style="text-decoration:none;color:inherit">
                    <strong>{{ team.name }}</strong>
                </a>
                <span class="text-muted ms-2" style="font-size:13px">{{ team.hackathon.name }}</span>
            </div>
            <span class="text-muted" style="font-size:13px">{{ team.captain.get_full_name|default:team.captain.username }}</span>
        </div>
    </div>
{% empty %}
    <p class="text-muted">Brak zespołów.</p>
{% endfor %}
{% endblock %}
