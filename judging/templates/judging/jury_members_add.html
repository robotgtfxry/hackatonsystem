{% extends 'base.html' %}
{% block title %}Dodaj jury — {{ hackathon.name }}{% endblock %}

{% block content %}
<h2>Dodaj członków jury</h2>
<p class="text-muted" style="font-size:13px">{{ hackathon.name }} — wpisz po jednym na linię: <code>Imię Nazwisko, email@example.com</code></p>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <textarea name="entries" id="entries" class="form-control" rows="8"
                  placeholder="Jan Kowalski, jan@example.com&#10;Anna Nowak, anna@example.com"></textarea>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Dodaj wszystkich</button>
        <a href="{% url 'jury:members' %}" class="btn btn-outline-primary">Anuluj</a>
    </div>
</form>
{% endblock %}
