{% extends 'base.html' %}
{% block title %}Kod QR — {{ member.name }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h2><i class="bi bi-qr-code"></i> {{ member.name }}</h2>
    <p class="text-muted">{{ member.email }}</p>

    <div class="my-4">
        <div id="qrcode" class="d-inline-block p-3 bg-white rounded shadow"></div>
    </div>

    <p class="text-muted small">Token: <code>{{ member.qr_token }}</code></p>

    <a href="{% url 'judging:jury_session_login' member.qr_token %}" class="btn btn-primary mt-3">
        <i class="bi bi-box-arrow-in-right"></i> Zaloguj się do sesji głosowania
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    new QRCode(document.getElementById("qrcode"), {
        text: "{{ member.qr_token }}",
        width: 256,
        height: 256,
        colorDark: "#000000",
        colorLight: "#ffffff",
    });
</script>
{% endblock %}
