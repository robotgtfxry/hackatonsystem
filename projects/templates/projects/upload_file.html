{% extends 'base.html' %}

{% block title %}Dodaj plik{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Dodaj plik</h2>
        <p class="text-muted" style="font-size:13px">Projekt: {{ project.title }}</p>
        <div class="card p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Prześlij</button>
                    <a href="{% url 'projects:detail' project.pk %}" class="btn btn-outline-primary">Anuluj</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
