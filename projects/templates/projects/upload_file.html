{% extends 'base.html' %}

{% block title %}Dodaj plik{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2>Dodaj plik do: {{ project.title }}</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Prześlij</button>
                <a href="{% url 'projects:detail' project.pk %}" class="btn btn-outline-secondary">Anuluj</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
