{% extends 'base.html' %}

{% block title %}Utwórz konto jury{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2><i class="bi bi-person-plus"></i> Utwórz konto jury</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="invalid-feedback d-block">
                                {% for error in field.errors %}{{ error }}{% endfor %}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Utwórz konto jury</button>
                <a href="{% url 'hackathon:admin_panel' %}" class="btn btn-outline-secondary">Anuluj</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
